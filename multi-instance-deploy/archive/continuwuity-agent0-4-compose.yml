name: agent0-4

# =============================================================================
# Agent Zero + Matrix Homeserver (Continuwuity) Pair — Instance 4
# Migrated from Dendrite v0.15.2 to Continuwuity v0.5.6
# =============================================================================

services:
  # --- AI AGENT ---
  agent-zero:
    image: agent0ai/agent-zero
    container_name: agent0-4
    hostname: agent0-4
    restart: unless-stopped
    command: /bin/bash -c '/a0/usr/workdir/startup-services.sh & exec /usr/bin/python3 /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf'
    mac_address: "02:42:AC:17:58:04"
    ports:
      - "50004:80"
      - "50025:22"
    environment:
      - API_KEY_OPENROUTER=${API_KEY_OPENROUTER}
      - API_KEY_OPENAI=${API_KEY_OPENAI}
      - API_KEY_ANTHROPIC=${API_KEY_ANTHROPIC}
      - API_KEY_GOOGLE=${API_KEY_GOOGLE}
      - API_KEY_GROQ=${API_KEY_GROQ}
      - AUTH_LOGIN=${AUTH_LOGIN}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - TZ=${TZ:-America/Los_Angeles}
      - MATRIX_HOMESERVER_URL=http://agent0-4-mhs:8008
    volumes:
      - ./usr:/a0/usr
    networks:
      macvlan-172-23:
        ipv4_address: 172.23.88.4
      bridge-local:
    extra_hosts:
      - "agent0-4-mhs:172.23.89.4"

  # --- MATRIX HOMESERVER (CONTINUWUITY) ---
  continuwuity:
    image: ghcr.io/continuwuity/continuwuity:latest
    container_name: agent0-4-continuwuity
    hostname: agent0-4-continuwuity
    restart: unless-stopped
    environment:
      CONTINUWUITY_SERVER_NAME: "agent0-4-mhs.cybertribe.com"
      CONTINUWUITY_DATABASE_PATH: "/var/lib/continuwuity"
      CONTINUWUITY_PORT: "6167"
      CONTINUWUITY_ADDRESS: "0.0.0.0"
      CONTINUWUITY_ALLOW_REGISTRATION: "false"
      CONTINUWUITY_ALLOW_FEDERATION: "true"
      CONTINUWUITY_MAX_REQUEST_SIZE: "20000000"
      CONTINUWUITY_TRUSTED_SERVERS: '["v-site.net"]'
      CONTINUWUITY_LOG: "info"
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - ./mhs/continuwuity-data:/var/lib/continuwuity
    networks:
      bridge-local:

  # --- TLS REVERSE PROXY (CADDY) ---
  caddy:
    image: caddy:2-alpine
    container_name: agent0-4-mhs
    hostname: agent0-4-mhs
    restart: unless-stopped
    volumes:
      - ./mhs/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./mhs/server.crt:/etc/caddy/server.crt:ro
      - ./mhs/server.key:/etc/caddy/server.key:ro
    networks:
      macvlan-172-23:
        ipv4_address: 172.23.89.4
      bridge-local:
    mac_address: "02:42:AC:17:59:04"
    depends_on:
      - continuwuity

networks:
  macvlan-172-23:
    external: true
  bridge-local:
    driver: bridge
