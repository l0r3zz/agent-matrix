services:
  agent0-1:
    image: agent0ai/agent-zero
    container_name: agent0-1
    hostname: agent0-1
    restart: unless-stopped
    env_file: usr/.env
    command: /bin/bash -c '/a0/usr/workdir/startup-services.sh & exec /usr/bin/python3 /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf'
    ports:
      - "50001:80"
      - "50022:22"
    volumes:
      - ./usr:/a0/usr
    networks:
      macvlan-172-23:
        ipv4_address: 172.23.88.1
      bridge-local:
    mac_address: "02:42:AC:17:58:01"
    extra_hosts:
      - "agent0-1-mhs:172.23.89.1"

  # Continuwuity Matrix homeserver (replaces Dendrite)
  continuwuity:
    image: ghcr.io/continuwuity/continuwuity:latest
    container_name: agent0-1-continuwuity
    hostname: agent0-1-continuwuity
    restart: unless-stopped
    environment:
      CONTINUWUITY_SERVER_NAME: "agent0-1-mhs.cybertribe.com"
      CONTINUWUITY_DATABASE_PATH: "/var/lib/continuwuity"
      CONTINUWUITY_PORT: "6167"
      CONTINUWUITY_ADDRESS: "0.0.0.0"
      CONTINUWUITY_ALLOW_REGISTRATION: "false"
      CONTINUWUITY_ALLOW_FEDERATION: "true"
      CONTINUWUITY_MAX_REQUEST_SIZE: "20000000"
      CONTINUWUITY_TRUSTED_SERVERS: '["v-site.net"]'
      CONTINUWUITY_LOG: "info"
    volumes:
      - ./mhs/continuwuity-data:/var/lib/continuwuity
    networks:
      bridge-local:

  # Caddy reverse proxy — TLS termination for federation
  caddy:
    image: caddy:2-alpine
    container_name: agent0-1-mhs
    hostname: agent0-1-mhs
    restart: unless-stopped
    volumes:
      - ./mhs/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./mhs/server.crt:/etc/caddy/server.crt:ro
      - ./mhs/server.key:/etc/caddy/server.key:ro
    networks:
      macvlan-172-23:
        ipv4_address: 172.23.89.1
      bridge-local:
    mac_address: "02:42:AC:17:59:01"
    depends_on:
      - continuwuity

networks:
  macvlan-172-23:
    external: true
  bridge-local:
    driver: bridge
