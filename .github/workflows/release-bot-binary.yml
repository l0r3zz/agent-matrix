# =============================================================================
# agent-matrix — Build & Release Matrix Bot Binaries
# Compiles the Rust matrix-bot and publishes binaries as GitHub Release assets.
# Trigger: push a version tag (e.g. git tag v0.1.0 && git push origin v0.1.0)
#          or run manually from the Actions tab with a custom tag.
# =============================================================================
name: Release Bot Binary

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build bot binaries
        run: |
          cd multi-instance-deploy/templates/matrix-bot/rust
          cargo build --release
          ls -lh target/release/matrix-bot-rust target/release/set-display-name-rust

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release with binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Matrix Bot ${{ steps.tag.outputs.tag }}"
          body: "Pre-built Linux/amd64 binaries for the Rust Matrix bot."
          files: |
            multi-instance-deploy/templates/matrix-bot/rust/target/release/matrix-bot-rust
            multi-instance-deploy/templates/matrix-bot/rust/target/release/set-display-name-rust
